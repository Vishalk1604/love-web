# Deploys this static site to GitHub Pages on every push to main.
# No build step — the repo root IS the website.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only let one deploy run at a time; don't cancel an in-progress one
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # upload the whole repo root (the site)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
